name: Lint (flake8)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install flake8
        run: pip install flake8

      - name: Find Python files
        id: find
        run: |
          FILES=$(find . -name "*.py" \
            -not -path "./__pycache__/*" \
            -not -path "./.git/*" \
            | sort | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "No .py files found — skipping."
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "files=$FILES" >> $GITHUB_OUTPUT
          fi

      - name: Lint — syntax errors only (E9 F63 F7, no F82x)
        if: steps.find.outputs.found == 'true'
        run: |
          flake8 ${{ steps.find.outputs.files }} \
            --count \
            --select=E9,F63,F7 \
            --show-source \
            --statistics

      - name: Lint — style warnings (exit-zero)
        if: steps.find.outputs.found == 'true'
        run: |
          flake8 ${{ steps.find.outputs.files }} \
            --count \
            --exit-zero \
            --max-complexity=15 \
            --max-line-length=200 \
            --extend-ignore=F821,F824 \
            --statistics
