name: Python Compatibility
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  compat:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Find and check v0rtex.py
        shell: bash
        run: |
          FILE=$(find . -name "v0rtex.py" | head -1)
          echo "File: $FILE"
          python -m py_compile "$FILE" && echo "OK Python ${{ matrix.python-version }}"
      - name: Check line count
        shell: bash
        run: |
          FILE=$(find . -name "v0rtex.py" | head -1)
          LINES=$(wc -l < "$FILE")
          echo "Lines: $LINES"
