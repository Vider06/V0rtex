name: V0RTEX Security Engine v3 (Full CI Security Suite)

on:
  pull_request:
    branches: ["main", "Windows_Release", "Linux_Release", "Macos_Release", "TESTING-GENERAL"]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  security:
    runs-on: ubuntu-latest

    steps:

      - name: Pipeline start
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "[V0RTEX SECURITY ENGINE v3]"
          echo "STATUS: STARTED"
          echo "EVENT: pull_request"
          echo "BRANCH: ${{ github.base_ref }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diff analysis
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)
          echo "$DIFF" > diff.txt

          RISK=0

          echo "$DIFF" | grep -qE "eval\(|exec\(|__import__" && RISK=$((RISK+50)) || true
          echo "$DIFF" | grep -qE "socket|requests|urllib" && RISK=$((RISK+15)) || true
          echo "$DIFF" | grep -qE "crypto|encrypt|decrypt|hash" && RISK=$((RISK+10)) || true
          echo "$DIFF" | grep -qE "\.github/workflows" && RISK=$((RISK+40)) || true

          echo "risk=$RISK" >> $GITHUB_OUTPUT

          echo "[INFO] Diff analysis complete"
          echo "[INFO] Risk score: $RISK"

      - name: AST security scan
        run: |
          echo "::group::AST SECURITY SCAN"

          python - << 'EOF'
          import ast, os, json

          results = []
          stats = {"total_files": 0, "critical": 0}

          for root, _, files in os.walk("."):
              for f in files:
                  if not f.endswith(".py"):
                      continue

                  path = os.path.join(root, f)
                  stats["total_files"] += 1

                  try:
                      with open(path, "r", encoding="utf-8") as file:
                          tree = ast.parse(file.read(), filename=path)
                  except Exception:
                      results.append({"file": path, "risk": "LOW", "issue": "parse_error"})
                      continue

                  file_risk = "LOW"

                  for node in ast.walk(tree):
                      if isinstance(node, ast.Call):
                          name = getattr(node.func, "id", None)
                          if name in ("eval", "exec"):
                              file_risk = "CRITICAL"
                              stats["critical"] += 1

                  results.append({"file": path, "risk": file_risk})

          with open("ast_report.json", "w") as f:
              json.dump({"stats": stats, "results": results}, f, indent=2)

          print("[OK] AST scan completed")
          EOF

          echo "::endgroup::"

      - name: Secret detection
        run: |
          echo "::group::SECRET SCAN"

          grep -R -nE "API_KEY|TOKEN|SECRET|PASSWORD|PRIVATE_KEY" . --include="*.py" > secrets.txt || true

          echo "[INFO] Secret scan completed"
          echo "::endgroup::"

      - name: Dependency audit
        run: |
          echo "::group::DEPENDENCY AUDIT"

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip install pip-audit
            pip check || true
            pip-audit || true
          fi

          echo "::endgroup::"

      - name: Compile safety
        run: |
          python - << 'EOF'
          import py_compile, os

          failed = False

          for root, _, files in os.walk("."):
              for f in files:
                  if f.endswith(".py"):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except:
                          failed = True

          open("compile_flag.txt", "w").write("FAIL" if failed else "OK")
          print("[OK] Compile check done")
          EOF

      - name: Generate HTML report
        run: |
          python - << 'EOF'
          import json

          data = json.load(open("ast_report.json"))

          html = f"""
          <html>
          <head>
          <title>V0RTEX Security Report</title>
          <style>
          body {{ font-family: Arial; background: #0f0f0f; color: white; }}
          .box {{ padding: 10px; border: 1px solid #333; margin: 10px; }}
          .crit {{ color: red; }}
          .low {{ color: green; }}
          </style>
          </head>
          <body>

          <h1>V0RTEX Security Report</h1>

          <div class="box">
          <h2>Stats</h2>
          <pre>{data["stats"]}</pre>
          </div>

          <div class="box">
          <h2>Files</h2>
          <ul>
          """

          for r in data["results"]:
              color = "crit" if r["risk"] == "CRITICAL" else "low"
              html += f'<li class="{color}">{r["file"]} - {r["risk"]}</li>'

          html += """
          </ul>
          </div>

          </body>
          </html>
          """

          with open("security_report.html", "w") as f:
              f.write(html)

          print("[OK] HTML report generated")
          EOF

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: v0rtex-security-report
          path: |
            security_report.html
            ast_report.json
            diff.txt
            secrets.txt
            compile_flag.txt

      - name: Final evaluation
        run: |
          RISK=${{ steps.diff.outputs.risk }}

          echo "[FINAL RISK] $RISK"

          if [ -f compile_flag.txt ] && grep -q "FAIL" compile_flag.txt; then
            echo "[BLOCKED] Compilation failed"
            exit 1
          fi

          if [ "$RISK" -ge 80 ]; then
            echo "[BLOCKED] High-risk PR"
            exit 1
          elif [ "$RISK" -ge 40 ]; then
            echo "[REVIEW] Manual inspection suggested"
          else
            echo "[SAFE] OK"
          fi

      - name: Pipeline end
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "[V0RTEX SECURITY ENGINE v3]"
          echo "STATUS: FINISHED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
