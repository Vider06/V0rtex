name: V0RTEX Security Engine v3 (Full CI Security Suite)

on:
  pull_request:
    branches: ["main", "Windows_Release", "Linux_Release", "Macos_Release", "TESTING-GENERAL"]

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest

    steps:

      - name: Pipeline start
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "[V0RTEX SECURITY ENGINE v3]"
          echo "STATUS: STARTED"
          echo "EVENT: pull_request"
          echo "BRANCH: ${{ github.base_ref }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diff analysis
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)
          echo "$DIFF" > diff.txt

          RISK=0

          echo "$DIFF" | grep -qE "eval\(|exec\(|__import__" && RISK=$((RISK+50)) || true
          echo "$DIFF" | grep -qE "socket|requests|urllib" && RISK=$((RISK+15)) || true
          echo "$DIFF" | grep -qE "crypto|encrypt|decrypt|hash" && RISK=$((RISK+10)) || true
          echo "$DIFF" | grep -qE "\.github/workflows" && RISK=$((RISK+40)) || true

          echo "risk=$RISK" >> $GITHUB_OUTPUT

      - name: AST security scan
        run: |
          python - << 'EOF'
          import ast, os, json

          results = []
          risky = []

          for root, _, files in os.walk("."):
              for f in files:
                  if not f.endswith(".py"):
                      continue

                  path = os.path.join(root, f)

                  try:
                      with open(path, "r", encoding="utf-8") as file:
                          tree = ast.parse(file.read(), filename=path)
                  except Exception:
                      results.append({"file": path, "risk": "LOW", "issue": "parse_error"})
                      continue

                  file_risk = "LOW"

                  for node in ast.walk(tree):
                      if isinstance(node, ast.Call):
                          name = getattr(node.func, "id", None)
                          if name in ("eval", "exec"):
                              file_risk = "CRITICAL"
                              risky.append(path)

                  results.append({"file": path, "risk": file_risk})

          with open("ast_report.json", "w") as f:
              json.dump(results, f, indent=2)

          print("AST SCAN COMPLETE")
          EOF

      - name: Secret detection
        run: |
          grep -R -nE "API_KEY|TOKEN|SECRET|PASSWORD|PRIVATE_KEY" . --include="*.py" > secrets.txt || true

      - name: Dependency audit
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip install pip-audit
            pip check || true
            pip-audit || true
          fi

      - name: Compile safety
        run: |
          python - << 'EOF'
          import py_compile, os, sys

          failed = False

          for root, _, files in os.walk("."):
              for f in files:
                  if f.endswith(".py"):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except:
                          failed = True

          if failed:
              open("compile_fail.flag", "w").write("fail")

          print("COMPILE DONE")
          EOF

      - name: Risk engine aggregation
        run: |
          RISK=${{ steps.diff.outputs.risk }}

          STATUS="SAFE"
          if [ "$RISK" -ge 80 ]; then STATUS="CRITICAL"; fi
          if [ "$RISK" -ge 40 ] && [ "$RISK" -lt 80 ]; then STATUS="HIGH"; fi
          if [ "$RISK" -lt 40 ]; then STATUS="LOW"; fi

          echo "{\"score\": $RISK, \"status\": \"$STATUS\"}" > security_report.json

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: v0rtex-security-report
          path: security_report.json

      - name: PR Comment report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const report = JSON.parse(fs.readFileSync('security_report.json', 'utf8'));

            const body = `## 🛡 V0RTEX Security Report

**Score:** ${report.score}  
**Status:** ${report.status}
`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Final evaluation
        run: |
          RISK=${{ steps.diff.outputs.risk }}

          if [ -f compile_fail.flag ]; then
            echo "COMPILATION FAILED"
            exit 1
          fi

          if [ "$RISK" -ge 80 ]; then
            echo "BLOCKED"
            exit 1
          elif [ "$RISK" -ge 40 ]; then
            echo "REVIEW REQUIRED"
          else
            echo "SAFE"
          fi

      - name: Pipeline end
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "[V0RTEX SECURITY ENGINE v3]"
          echo "STATUS: FINISHED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
