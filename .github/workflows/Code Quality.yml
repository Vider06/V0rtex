name: Code Quality
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Lint v0rtex.py (errors only)
        run: |
          FILE=$(find . -name "v0rtex.py" | head -1)
          echo "Linting: $FILE"
          # E9 = syntax/runtime errors, F63/F7/F82 = undefined names, import errors
          flake8 "$FILE" \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --max-line-length=200
