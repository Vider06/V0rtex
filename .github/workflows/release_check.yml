name: Release Check

on:
  push:
    tags:
      - "v*"

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version.txt
        id: ver
        run: |
          if [ -f version.txt ]; then
            VER=$(cat version.txt | tr -d '[:space:]')
          else
            VER="(version.txt not found)"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "version.txt: $VER"

      - name: Validate CHANGELOG.md has entry for this tag
        run: |
          TAG="${GITHUB_REF##*/}"
          if [ -f CHANGELOG.md ] && grep -q "$TAG" CHANGELOG.md; then
            echo "✓ CHANGELOG.md has entry for $TAG"
          else
            echo "⚠ WARNING: No entry in CHANGELOG.md for $TAG"
          fi

      - name: Check update_manifest.json version matches tag
        run: |
          TAG="${GITHUB_REF##*/}"
          TAGVER="${TAG#v}"
          if [ -f update_manifest.json ]; then
            MANIFEST_VER=$(python3 -c "
          import json, sys
          d = json.load(open('update_manifest.json'))
          print(d.get('version', '').strip())
          " 2>/dev/null || echo "")
            if [ "$MANIFEST_VER" = "$TAGVER" ]; then
              echo "✓ update_manifest.json version matches tag ($TAGVER)"
            else
              echo "⚠ MISMATCH: manifest=$MANIFEST_VER  tag=$TAGVER"
            fi
          else
            echo "⚠ update_manifest.json not found"
          fi

      - name: Syntax check all .py files at this tag
        run: |
          FILES=$(find . -name "*.py" \
            -not -path "./__pycache__/*" \
            -not -path "./.git/*" \
            | sort)
          if [ -z "$FILES" ]; then
            echo "No .py files found."
            exit 0
          fi
          FAILED=0
          for f in $FILES; do
            python -m py_compile "$f" \
              && echo "  ✓ $f" \
              || { echo "  ✗ $f"; FAILED=1; }
          done
          [ $FAILED -eq 0 ] && echo "All files OK." || exit 1

      - name: Summary
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Release check complete"
          echo "  Tag:         $TAG"
          echo "  version.txt: ${{ steps.ver.outputs.version }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
