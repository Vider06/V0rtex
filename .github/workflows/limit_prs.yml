name: Limit Concurrent PRs

on:
  pull_request:
    types: [opened]

jobs:
  check-pr-limit:
    runs-on: ubuntu-latest
    steps:
      - name: Count open PRs
        uses: actions/github-script@v7
        with:
          script: |
            const limit = 2;
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });
            const count = prs.data.filter(
              pr => pr.base.ref === context.payload.pull_request.base.ref
            ).length;
            if (count > limit) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `❌ Too many open PRs on this branch (${count}/${limit}). Please wait.`
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                state: "closed"
              });
            }
