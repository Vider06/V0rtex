name: Syntax Check

on:
  pull_request:
    branches: ["*"]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check v0rtex.py syntax
        run: python -m py_compile v0rtex.py && echo "OK"
