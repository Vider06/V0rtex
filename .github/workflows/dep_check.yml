name: Dependency Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  deps:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Find requirements.txt
        id: req
        shell: bash
        run: |
          FILE=$(find . -name "requirements.txt" | head -1)
          if [ -z "$FILE" ]; then
            echo "No requirements.txt found — skipping."
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "path=$FILE" >> $GITHUB_OUTPUT
          fi

      - name: Find Python files
        id: pyfiles
        shell: bash
        run: |
          COUNT=$(find . -name "*.py" -not -path "./__pycache__/*" -not -path "./.git/*" | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "No .py files — skipping."
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.req.outputs.found == 'true' && steps.pyfiles.outputs.found == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ steps.req.outputs.path }}" \
            --prefer-binary --no-cache-dir -q \
            || pip install -r "${{ steps.req.outputs.path }}" \
               --user --prefer-binary --no-cache-dir -q

      - name: Import check — core packages
        if: steps.pyfiles.outputs.found == 'true'
        shell: python
        run: |
          import importlib, sys, subprocess, site
          for sp in ([site.getusersitepackages()] if hasattr(site,'getusersitepackages') else []) + \
                    (site.getsitepackages() if hasattr(site,'getsitepackages') else []):
              if sp and sp not in sys.path:
                  sys.path.insert(0, sp)
          importlib.invalidate_caches()
          pkgs = [
              ("requests",     "requests"),
              ("pefile",       "pefile"),
              ("psutil",       "psutil"),
              ("tkinterdnd2",  "tkinterdnd2"),
              ("fpdf2",        "fpdf"),
              ("watchdog",     "watchdog"),
              ("pystray",      "pystray"),
              ("Pillow",       "PIL"),
              ("cryptography", "cryptography"),
              ("reportlab",    "reportlab"),
              ("chardet",      "chardet"),
              ("dnspython",    "dns"),
              ("python-whois", "whois"),
              ("PyYAML",       "yaml"),
              ("olefile",      "olefile"),
              ("numpy",        "numpy"),
              ("matplotlib",   "matplotlib"),
          ]
          failed = []
          for pkg, mod in pkgs:
              ok = False
              try:
                  importlib.import_module(mod); ok = True
              except ImportError:
                  r = subprocess.run([sys.executable, "-c", f"import {mod}"],
                                     capture_output=True)
                  ok = r.returncode == 0
              print(f"  {'✓' if ok else '✗'} {pkg}")
              if not ok:
                  failed.append(pkg)
          if failed:
              print(f"\nMISSING: {failed}")
              raise SystemExit(1)
          print("All packages importable.")
