name: Syntax Check
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check v0rtex.py syntax
        run: |
          FILE=$(find . -name "v0rtex.py" | head -1)
          if [ -z "$FILE" ]; then
            echo "v0rtex.py not found in repo"
            exit 1
          fi
          echo "Checking: $FILE"
          python -m py_compile "$FILE" && echo "OK — syntax clean"
