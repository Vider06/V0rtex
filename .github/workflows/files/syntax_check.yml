name: Syntax Check

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax on all .py files
        run: |
          FILES=$(find . -name "*.py" \
            -not -path "./__pycache__/*" \
            -not -path "./.git/*" \
            | sort)
          if [ -z "$FILES" ]; then
            echo "No .py files found — skipping."
            exit 0
          fi
          FAILED=0
          for f in $FILES; do
            python -m py_compile "$f" \
              && echo "  ✓ $f" \
              || { echo "  ✗ $f  SYNTAX ERROR"; FAILED=1; }
          done
          [ $FAILED -eq 0 ] && echo "All files OK." || exit 1
